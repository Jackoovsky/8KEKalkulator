.category-content { display:none; padding:10px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:14px; }
td, th { border:1px solid #333; padding:5px; text-align:center; }
input { width:50px; background:#111; color:white; border:1px solid #555; }
.sticky-total { position:fixed; bottom:0; width:100%; background:#111; padding:10px; text-align:center; font-weight:bold; }

// -------------------- PRESETY KLAS --------------------

},
"KM’ista": {

},

}
};

// -------------------- RENDER --------------------
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  for(const [cat,items] of Object.entries(data)){
    const div=document.createElement("div"); div.className="category";
    const head=document.createElement("div"); head.className="category-header"; head.textContent=cat;
    const cont=document.createElement("div"); cont.className="category-content";
    head.onclick=()=>cont.style.display=cont.style.display==="block"?"none":"block";
    const table=document.createElement("table");
    table.innerHTML="<tr><th>Nazwa</th><th>Cena</th><th>Ilość</th><th>Koszt</th></tr>";
    items.forEach(i=>{
      const row=document.createElement("tr");
      row.innerHTML=`<td>${i[0]}</td><td>${i[1]}</td><td><input type="number" min="0"></td><td class="c">0</td>`;
      table.appendChild(row);
    });
    cont.appendChild(table);
    div.appendChild(head); div.appendChild(cont);
    app.appendChild(div);
  }
  document.querySelectorAll("input").forEach(i=>i.oninput=update);
}

// -------------------- FUNKCJE --------------------
function update(){
  let total=0;
  document.querySelectorAll("tr").forEach(r=>{
    const price=parseFloat(r.children[1]?.textContent)||0;
    const qty=parseInt(r.querySelector("input")?.value)||0;
    if(r.querySelector(".c")) r.querySelector(".c").textContent=price*qty;
    total+=price*qty;
  });
  document.getElementById("total").textContent=total;
}

function resetAll(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  update();
}

function applyPreset(){
  resetAll();
  const selected=document.getElementById("preset").value;
  const p=presets[selected];
  if(!p) return;
  document.querySelectorAll("tr").forEach(r=>{
    const name=r.children[0].textContent;
    if(p[name]!==undefined) r.querySelector("input").value=p[name];
  });
  update();
}

// -------------------- INIT --------------------
const sel=document.getElementById("preset");
Object.keys(presets).forEach(p=>{
  const o=document.createElement("option"); o.textContent=p; sel.appendChild(o);
});

render(); update();
</script>
