<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Loadoutu PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f1419;
  color: #e6e6e6;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.reset-btn {
  display: block;
  margin: 10px auto 20px auto;
  padding: 10px 20px;
  background: #8b0000;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.reset-btn:hover {
  background: #a30000;
}

.category {
  margin-top: 20px;
  border: 1px solid #333;
  border-radius: 8px;
  overflow: hidden;
}

.category-header {
  background: #1f2a33;
  padding: 12px;
  cursor: pointer;
  font-weight: bold;
}

.category-header:hover {
  background: #2c3b47;
}

.category-content {
  display: none;
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #333;
  padding: 6px;
  text-align: center;
}

input {
  width: 60px;
  background: #111;
  color: white;
  border: 1px solid #555;
}

.sticky-total {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  border-top: 2px solid #444;
}
</style>

</head>
<body>

<h1>Kalkulator Loadoutu</h1>

<button class="reset-btn" onclick="resetAll()">🔄 Reset Loadoutu</button>

<div id="app"></div>

<div class="sticky-total">
💰 SUMA CAŁKOWITA: <span id="total">0</span>
</div>

<script>

const data = {
  "🧥 Plecaki i Ubrania": [
    ["AN/RPC-77 radio",100],["spadochron",25],["medical tent",100],
    ["plecak mały",0],["plecak zwykły",20],["plecak lodówka",80],
    ["jammer backpack",200],["NVG",200],["Stroboskop",20]
  ],

  "🔫 Bronie, Dodatki i Amunicja": [
    ["PKM",60],["M249 SAW",50],["M240B",60],["SWD",60],
    ["Grot wyborowy",70],["M40A5",70],["RPG-7",100],
    ["RPG-75",70],["M72A3 LAW",75],["GROM",150],
    ["Mine detector",100],["tłumik zwykły",50],
    ["tłumik DMR",100],["optyka termal/NVG",250]
  ],

  "🎒 Wyposażenie": [
    ["lornetka zwykła",10],["lornetka dalmierz",30],
    ["grot granatnik",50],["Granat zaczepny",4],
    ["Granat dymny",2],["Mina AP",10],
    ["Mina AT",25],["ładunek M112",10],
    ["detonator",20],["AN/PSN 13 DAGR",50],
    ["sandbag",1],["sandbag box",20]
  ],

  "💉 Medykamenty": [
    ["Morphine",1],["Epinephrine",2],["Nalexone",2],
    ["Metopropol",2],["Phenylepine",2],["Sniff",2],
    ["Saline solution",3],["NCD kit",2],
    ["King LT",2],["Chest Seal",2],["Medical Kit",20]
  ],

  "🤖 Drony": [
    ["drone googles",200],["dron SAL",800],
    ["battery SAL",100],["Drone controller",100],
    ["Drone antena",250],["Command station",250]
  ],

  "🚗 Pojazdy naziemne": [
    ["M998",100],["UAZ-469",100],["M1025",150],
    ["M1A1",8000],["M1A1 - TUSK",9000]
  ],

  "✈️ Pojazdy powietrzne": [
    ["MH-6M",1500],["Mi-8MT Supply",2500],
    ["CH53",8000],["Mi-24V",10000]
  ],

  "💣 Pociski": [
    ["81mm Fragmentation",10],["81mm smoke",5],
    ["81mm illumination",5],["M107 HE",35],
    ["M231 charge 1L",5],["M232 charge 5H",25]
  ]
};

function render() {
  const app = document.getElementById("app");

  Object.entries(data).forEach(([category, items]) => {

    const div = document.createElement("div");
    div.className = "category";

    const header = document.createElement("div");
    header.className = "category-header";
    header.innerText = category;

    const content = document.createElement("div");
    content.className = "category-content";

    header.onclick = () => {
      content.style.display = content.style.display === "block" ? "none" : "block";
    };

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th>Nazwa</th>
        <th>Cena</th>
        <th>Ilość</th>
        <th>Koszt</th>
      </tr>
    `;

    items.forEach(item => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${item[0]}</td>
        <td>${item[1]}</td>
        <td><input type="number" min="0" value="0"></td>
        <td class="cost">0</td>
      `;

      table.appendChild(row);
    });

    content.appendChild(table);

    div.appendChild(header);
    div.appendChild(content);

    app.appendChild(div);
  });

  document.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", updateTotal);
  });
}

function updateTotal() {
  let total = 0;

  document.querySelectorAll("tr").forEach(row => {
    if (row.children.length < 4) return;

    const price = parseFloat(row.children[1].innerText);
    const input = row.children[2].querySelector("input");
    if (!input) return;

    const qty = parseInt(input.value) || 0;
    const cost = price * qty;

    row.children[3].innerText = cost;
    total += cost;
  });

  document.getElementById("total").innerText = total;
}

function resetAll() {
  document.querySelectorAll("input").forEach(input => {
    input.value = 0;
  });

  updateTotal();
}

render();

</script>

</body>
</html>
